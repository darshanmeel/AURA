
# Name your project! Project names should be lowercase and use underscores as separators
# See documentation: https://docs.getdbt.com/docs/build/projects

name: 'aura'
version: '1.0.0'
config-version: 2

profile: 'aura'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
data-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_modules"

models:
  aura:
    staging:
      materialized: view
    intermediate:
      materialized: view
    marts:
      materialized: table
