name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch/PR so re-pushes don't queue up
# stale jobs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  watcher:
    name: watcher (pytest + ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: watcher/pyproject.toml

      - name: Install watcher package + test/lint tools
        run: python -m pip install -e ./watcher pytest ruff

      # watcher/pyproject.toml carries the [tool.ruff] config (line-length
      # matched to the existing code style; E/F/W + isort). See that file
      # for why line-length is 125, not ruff's default 88.
      - name: Lint (ruff)
        run: python -m ruff check watcher/src

      - name: Test (pytest)
        env:
          # main.py's AURA_DB_PATH default is a container path (/data/...)
          # that doesn't exist on the runner; tests themselves use tmp_path
          # fixtures and don't read this var, but set it defensively so any
          # code path that does touch it resolves to a writable temp file
          # rather than an absolute container path.
          AURA_DB_PATH: ${{ runner.temp }}/aura_ci.duckdb
        run: python -m pytest watcher/tests -q

  dbt:
    name: dbt (parse + compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # Pinned to match the versions actually running in the watcher
      # container today (verified via `docker exec aura-watcher-1 pip list`,
      # 2026-07-16), not just the unpinned `>=1.7.0` floor in
      # watcher/pyproject.toml — dbt-duckdb minor versions have broken
      # DuckDB compatibility before, so CI should track what's deployed.
      - name: Install dbt-duckdb
        run: python -m pip install "dbt-core==1.12.0" "dbt-duckdb==1.10.1" "duckdb==1.5.4"

      - name: dbt deps (if packages.yml exists)
        working-directory: dbt
        run: |
          if [ -f packages.yml ]; then
            dbt deps --profiles-dir .
          else
            echo "No dbt/packages.yml - skipping dbt deps."
          fi

      - name: dbt parse
        working-directory: dbt
        env:
          AURA_DB_PATH: ${{ runner.temp }}/aura_ci_parse.duckdb
        run: dbt parse --profiles-dir . --project-dir .

      - name: dbt compile
        working-directory: dbt
        env:
          AURA_DB_PATH: ${{ runner.temp }}/aura_ci_compile.duckdb
        run: dbt compile --profiles-dir . --project-dir .

      # NOTE: dbt build/test against real data is intentionally out of scope
      # for this job. There is no sample/fixture JSONL checked in under
      # examples/ (only examples/aura.toml, a config file) to ingest through
      # the watcher and populate raw_events, so `dbt build` would run against
      # an empty scratch DB and its results wouldn't verify anything real.
      # This job therefore verifies the project *parses and compiles*
      # (catches Jinja/ref/source errors, schema.yml typos, broken macros)
      # but not query correctness against data. See CI lane caveat.

  frontend:
    name: frontend (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # frontend/package.json has a "lint" script (`next lint`), but there is
      # no .eslintrc* in frontend/ yet, so `next lint` stops at an interactive
      # "How would you like to configure ESLint?" prompt instead of running —
      # confirmed locally, it hangs indefinitely with no TTY. Deliberately
      # NOT added as a CI step until frontend/ has a checked-in ESLint config
      # (out of this lane's scope: frontend/ belongs to frontend-engineer).
      # `next build` still runs its own type-check regardless.

      - name: Build
        working-directory: frontend
        run: npm run build
