version: '3.8'

services:
  watcher:
    build:
      context: ./watcher
    container_name: aura-watcher
    volumes:
      - aura_data:/data
      - ~/.claude/projects:/logs/claude:ro
      - ./dbt:/app/dbt
    environment:
      - AURA_LOGS_DIR=/logs/claude
      - AURA_DB_PATH=/data/aura.duckdb
      - AURA_READ_DB_PATH=/data/aura_read.duckdb
      - AURA_SNAPSHOT_INTERVAL=2
    networks:
      - aura

  streamlit:
    build:
      context: ./streamlit
    container_name: aura-streamlit
    ports:
      - "8501:8501"
    volumes:
      - aura_data:/data
    environment:
      - AURA_READ_DB=/data/aura_read.duckdb
    networks:
      - aura
    depends_on:
      - watcher

volumes:
  aura_data:
    driver: local

networks:
  aura:
    driver: bridge
